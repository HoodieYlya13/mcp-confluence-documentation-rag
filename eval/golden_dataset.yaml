  - query: "What is the base register address of the BA3 BPM controller?"
    role: ATS_CORE_LEAD
    expected_doc: sps_beam_instrumentation
  - query: "Which interrupt level does the beam loss integrator use?"
    role: ATS_CORE_LEAD
    expected_doc: sps_beam_instrumentation
  - query: "What command word resets the VME instrumentation hardware?"
    role: ATS_CORE_LEAD
    expected_doc: sps_beam_instrumentation
  - query: "What is the maximum calibration error for the beam current transformer?"
    role: ATS_CORE_LEAD

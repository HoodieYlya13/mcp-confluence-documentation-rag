# Golden retrieval dataset for the offline evaluation harness.
# Runs against the bundled mock corpus (local source), so expected_doc uses the
# local doc_id slugs. Gates: hit_rate@3 >= 0.9, adversarial leaks == 0.

retrieval:
  - query: "What is the vacuum warning threshold for Sector 3-4 Q1?"
    role: JUNIOR_OP
    expected_doc: lhc_cryo_troubleshooting
  - query: "At what pressure does the cryogenic interlock dump the beam?"
    role: JUNIOR_OP
    expected_doc: lhc_cryo_troubleshooting
  - query: "What should I do when a vacuum warning threshold is breached?"
    role: JUNIOR_OP
    expected_doc: lhc_cryo_troubleshooting

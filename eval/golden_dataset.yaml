    role: JUNIOR_OP
    expected_doc: lhc_cryo_troubleshooting
  - query: "Why must BIS inputs for cryo-vacuum never be bypassed?"
    role: JUNIOR_OP
    expected_doc: lhc_cryo_troubleshooting
  - query: "How do I recover after an interlock trip in the LHC arc?"
    role: JUNIOR_OP
    expected_doc: lhc_cryo_troubleshooting
  - query: "What temperature must the helium bath stay below during operation?"
    role: JUNIOR_OP
    expected_doc: lhc_cryo_troubleshooting
  - query: "What is the target intensity for the production beam phase?"
    role: JUNIOR_OP
    expected_doc: linac4_injection_sop
  - query: "How does Linac4 convert H- ions to protons?"
    role: JUNIOR_OP
    expected_doc: linac4_injection_sop
  - query: "When should the stripping foil be swapped to a spare?"
    role: JUNIOR_OP
    expected_doc: linac4_injection_sop
  - query: "What RF cavity phase is used for the pilot beam?"
    role: JUNIOR_OP
    expected_doc: linac4_injection_sop
  - query: "What is the maximum stripping foil temperature?"
    role: JUNIOR_OP
